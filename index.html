    // ── Local food search engine ────────────────────────────────────────────
    function searchLocalFoods(query) {
      const q = query.trim().toLowerCase();
      if (q.length < 2) return [];
      const qWords = q.split(/\s+/).filter(w => w.length >= 2);
      if (!qWords.length) return [];

      const calcScore = (name) => {
        const nLow  = name.toLowerCase();
        const nWords = nLow.split(/[\s\-\/]+/);
        if (nLow === q)                  return 100;
        if (nLow.startsWith(q + ' ') || nLow === q) return 95;
        if (nLow.startsWith(q))          return 90;
        const allExact = qWords.every(w => nWords.some(nw => nw === w));
        if (allExact)                    return 85;
        const allStartWith = qWords.every(w => nWords.some(nw => nw.startsWith(w)));
        if (allStartWith)                return 80;
        const hitCount = qWords.filter(w => nLow.includes(w)).length;
        if (hitCount === qWords.length)  return 70;
        if (hitCount > 0)                return 30 + (hitCount / qWords.length) * 35;
        // partial stem match (first 70% of each word) — must match at word boundary, not mid-word
        if (qWords.some(w => w.length >= 4 && nWords.some(nw => nw.startsWith(w.slice(0, Math.ceil(w.length * 0.7)))))) return 15;
        return 0;
      };

      const r1 = v => String(Math.round(Number(v) * 10) / 10);
      return LOCAL_FOOD_DB
        .map(item => ({ item, score: calcScore(item.n) }))
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score || a.item.n.length - b.item.n.length)
        .slice(0, 10)
        .map(({ item: d }) => ({
          name: d.n, rawName: d.n,
          servingUnit: d.u === 'g' ? 'grams' : d.u === 'oz' ? 'oz' : 'servings',
          servingAmount: String(d.s), quantity: String(d.s),
          calories: String(d.c), protein: r1(d.p), carbs: r1(d.b), fat: r1(d.f),
          displayCal: String(d.c), _local: true,
        }));
    }

    function AddFoodModal({ meal, onAdd, onClose, customFoods, onDeleteCustomFood }) {
      const [form, setForm] = useState({
        name:'', servingUnit:'grams', servingAmount:'100', quantity:'100',
        calories:'', protein:'', carbs:'', fat:'',
      });
      const [errors, setErrors]     = useState({});
      const [search, setSearch]     = useState('');
      const [dbResults, setDbResults] = useState([]);
      const [dbStatus, setDbStatus]   = useState('idle'); // idle | loading | done | error
      const searchTimer = React.useRef(null);
      const [scanMode, setScanMode] = useState(false);
      const [scanState, setScanState] = useState('idle'); // idle | scanning | loading | notfound | error | camerror
      const [lastBarcode, setLastBarcode] = useState('');
      const [myFoodsSearch, setMyFoodsSearch] = useState('');
      const [showAllMyFoods, setShowAllMyFoods] = useState(false);
      const scannerRef = React.useRef(null);
      const restartScanner = () => { setScanMode(false); setTimeout(() => setScanMode(true), 80); };
      const { label, icon } = MEAL_META[meal];

      // ── Scanner lifecycle (html5-qrcode) ──────────────
      useEffect(() => {
        if (!scanMode) return;
        setScanState('scanning');

        let active = true;
        const qr = new Html5Qrcode('barcode-reader', {
          formatsToSupport: [
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.CODE_128,
          ],
          verbose: false,
        });
        scannerRef.current = qr;

        let lastCode = null, streak = 0;

        const onSuccess = async (barcode) => {
          if (!active) return;
          // Require 2 consecutive reads to confirm (fast but reliable)
          if (barcode === lastCode) { streak++; } else { lastCode = barcode; streak = 1; }
          if (streak < 2) return;

          active = false;
          try { await qr.stop(); } catch {}
          scannerRef.current = null;
          setScanState('loading');
          setLastBarcode(barcode);

          // Build candidate URLs: try the raw barcode AND the EAN-13 variant
          // (US UPC-A is 12 digits; many OFf entries are stored as 13-digit EAN-13 with a leading 0)
          const candidates = [barcode];
          if (barcode.length === 12) candidates.push('0' + barcode);
          if (barcode.length === 13 && barcode.startsWith('0')) candidates.push(barcode.slice(1));

          const OZ_TO_G = 28.3495;
          const r1 = v => String(Math.round(Number(v) * 10) / 10);

          let matched = null;
          try {
            for (const code of candidates) {
              const res  = await fetch(
                `https://world.openfoodfacts.org/api/v0/product/${encodeURIComponent(code)}.json`,
                { signal: AbortSignal.timeout(7000) }
              );
              const json = await res.json();
              if (json.status === 1 && json.product) {
                const p = json.product;
                const n = p.nutriments || {};
                const per100Cal = Number(n['energy-kcal_100g'] || n['energy-kcal'] || 0);
                const srvCal    = Number(n['energy-kcal_serving'] || 0);
                // Skip products with zero caloric data (missing nutrition info)
                if (per100Cal === 0 && srvCal === 0) continue;
                matched = { p, n }; break;
              }
            }

            if (matched) {
              const { p, n } = matched;

              const rawName = (p.product_name || p.product_name_en || p.generic_name || '').trim();
              const brand   = (p.brands || '').split(',')[0].trim();
              const name    = rawName || (brand ? `${brand} Product` : 'Scanned Product');

              const per100Cal  = Number(n['energy-kcal_100g']  || n['energy-kcal'] || 0);
              const per100Pro  = Number(n['proteins_100g']      || n.proteins       || 0);
              const per100Carb = Number(n['carbohydrates_100g'] || n.carbohydrates  || 0);
              const per100Fat  = Number(n['fat_100g']           || n.fat            || 0);
              const srvCal     = Number(n['energy-kcal_serving']    || 0);
              const srvPro     = Number(n['proteins_serving']       || 0);
              const srvCarb    = Number(n['carbohydrates_serving']  || 0);
              const srvFat     = Number(n['fat_serving']            || 0);
              const srvQty     = parseFloat(p.serving_quantity) || 0;
              const srvUnit    = (p.serving_quantity_unit || '').toLowerCase().trim();

              let servingUnit, servingAmount, quantity, calories, protein, carbs, fat;

              if (srvQty > 0 && (srvUnit === 'g' || srvUnit === 'ml' || srvUnit === '')) {
                // Case 1: serving size in grams — scale from per-100g baseline
                servingUnit = 'grams'; servingAmount = String(srvQty); quantity = String(srvQty);
                const sc = srvQty / 100;
                calories = String(Math.round(srvCal || per100Cal * sc));
                protein  = r1(srvPro  || per100Pro  * sc);
                carbs    = r1(srvCarb || per100Carb * sc);
                fat      = r1(srvFat  || per100Fat  * sc);

              } else if (srvQty > 0 && srvUnit === 'oz') {
                // Case 2: serving size in ounces
                servingUnit = 'oz'; servingAmount = String(srvQty); quantity = String(srvQty);
                const sc = (srvQty * OZ_TO_G) / 100;
                calories = String(Math.round(srvCal || per100Cal * sc));
                protein  = r1(srvPro  || per100Pro  * sc);
                carbs    = r1(srvCarb || per100Carb * sc);
                fat      = r1(srvFat  || per100Fat  * sc);

              } else if (srvCal > 0) {
                // Case 3: no weight but OFf has per-serving nutriments
                servingUnit = 'servings'; servingAmount = '1'; quantity = '1';
                calories = String(Math.round(srvCal));
                protein  = r1(srvPro); carbs = r1(srvCarb); fat = r1(srvFat);

              } else {
                // Case 4: try to parse serving size from the text field (e.g. "1 oz (28g)")
                // Many US products have serving_size text but not structured serving_quantity
                const srvText   = (p.serving_size || '').trim();
                const gramParse = srvText.match(/\b(\d+(?:\.\d+)?)\s*g\b/i);
                const ozParse   = srvText.match(/\b(\d+(?:\.\d+)?)\s*oz\b/i);
                const txtQty    = gramParse ? parseFloat(gramParse[1]) : ozParse ? parseFloat(ozParse[1]) : 0;
                const txtUnit   = gramParse ? 'g' : ozParse ? 'oz' : '';

                if (txtQty > 0 && txtUnit === 'g') {
                  servingUnit = 'grams'; servingAmount = String(txtQty); quantity = String(txtQty);
                  const sc = txtQty / 100;
                  calories = String(Math.round(per100Cal * sc));
                  protein  = r1(per100Pro * sc); carbs = r1(per100Carb * sc); fat = r1(per100Fat * sc);
                } else if (txtQty > 0 && txtUnit === 'oz') {
                  servingUnit = 'oz'; servingAmount = String(txtQty); quantity = String(txtQty);
                  const sc = (txtQty * OZ_TO_G) / 100;
                  calories = String(Math.round(per100Cal * sc));
                  protein  = r1(per100Pro * sc); carbs = r1(per100Carb * sc); fat = r1(per100Fat * sc);
                } else {
                  // Final fallback: show per 100g so user can adjust the quantity field themselves
                  servingUnit = 'grams'; servingAmount = '100'; quantity = '100';
                  calories = String(Math.round(per100Cal));
                  protein  = r1(per100Pro); carbs = r1(per100Carb); fat = r1(per100Fat);
                }
              }

              setForm({ name, servingUnit, servingAmount, quantity, calories, protein, carbs, fat });
              setErrors({});
              setScanMode(false);

            } else {
              setScanState('notfound');
            }
          } catch {
            setScanState('error');
          }
        };

        qr.start(
          { facingMode: 'environment' },
          {
            fps: 15,
            qrbox: (w, h) => ({ width: Math.floor(w * 0.9), height: Math.floor(h * 0.45) }),
          },
          onSuccess,
          () => {} // ignore per-frame errors
        ).catch(() => { if (active) setScanState('camerror'); });

        return () => {
          active = false;
          if (scannerRef.current) { scannerRef.current.stop().catch(() => {}); scannerRef.current = null; }
        };
      }, [scanMode]);

      // Stop scanner if modal unmounts while scanning
      useEffect(() => () => {
        if (scannerRef.current) { scannerRef.current.stop().catch(() => {}); scannerRef.current = null; }
      }, []);

      // ── Food search: instant local DB + debounced API for branded items ──
      useEffect(() => {
        clearTimeout(searchTimer.current);
        const q = search.trim();

        // Clear on empty
        if (q.length === 0) { setDbResults([]); setDbStatus('idle'); return; }
        if (q.length === 1) { setDbResults([]); setDbStatus('short'); return; }

        // ① My Foods — personal library, highest priority, appears first in results
        const qLow2 = q.toLowerCase();
        const r1cf = v => String(Math.round(Number(v) * 10) / 10);
        const myFoodHits = (customFoods || [])
          .map(f => {
            const nLow = f.name.toLowerCase();
            const nWords = nLow.split(/[\s\-\/]+/);
            const qWords2 = qLow2.split(/\s+/).filter(w => w.length >= 1);
            let score = 0;
            if (nLow === qLow2)                                                   score = 100;
            else if (nLow.startsWith(qLow2))                                      score = 90;
            else if (qWords2.every(w => nWords.some(nw => nw === w)))             score = 85;
            else if (qWords2.every(w => nWords.some(nw => nw.startsWith(w))))     score = 80;
            else if (qWords2.every(w => nLow.includes(w)))                        score = 70;
            else if (qWords2.some(w => nLow.includes(w)))                         score = 30;
            return { f, score };
          })
          .filter(x => x.score > 0)
          .sort((a, b) => b.score - a.score || a.f.name.length - b.f.name.length)
          .slice(0, 5)
          .map(({ f }) => ({
            name: f.name, rawName: f.name,
            servingUnit: f.servingUnit || 'servings',
            servingAmount: String(f.servingAmount ?? 1),
            quantity: String(f.servingAmount ?? 1),
            calories: String(Math.round(Number(f.calories ?? f.caloriesPerServing ?? 0))),
            protein:  r1cf(f.protein  ?? f.proteinPerServing  ?? 0),
            carbs:    r1cf(f.carbs    ?? f.carbsPerServing    ?? 0),
            fat:      r1cf(f.fat      ?? f.fatPerServing      ?? 0),
            displayCal: String(Math.round(Number(f.calories ?? f.caloriesPerServing ?? 0))),
            _isMyFood: true,
          }));

        // ② Instant local search — zero latency, always works
        const localHits = searchLocalFoods(q);

        // Merge: My Foods first, then local (skip duplicates by name)
        const myFoodNames = new Set(myFoodHits.map(x => x.rawName.toLowerCase()));
        const freshLocal = localHits.filter(x => !myFoodNames.has(x.rawName.toLowerCase()));
        const initialResults = [...myFoodHits, ...freshLocal];

        setDbResults(initialResults);
        setDbStatus(initialResults.length > 0 ? 'done' : 'loading');

        // ② Debounced API search — supplements local with branded/packaged items
        if (q.length < 3) return;
        searchTimer.current = setTimeout(async () => {
          const r1      = v => Math.round(Number(v) * 10) / 10;
          const OZ_TO_G = 28.3495;
          const qLow    = q.toLowerCase();
          const qWords  = qLow.split(/\s+/).filter(w => w.length > 1);
          const reqHits = Math.max(1, qWords.length <= 3 ? qWords.length : Math.ceil(qWords.length * 0.75));

          const isRelevant = (name) => {
            const nw = name.toLowerCase().split(/\W+/);
            return qWords.filter(w => nw.some(n => n.startsWith(w))).length >= reqHits;
          };
          const apiScore = (name) => {
            const n = name.toLowerCase();
            if (n === qLow)                                                      return 4;
            if (n.startsWith(qLow))                                             return 3;
            if (qWords.every(w => n.split(/\W+/).some(nw => nw.startsWith(w)))) return 2;
            return 1;
          };

          // OFf search — try direct first (CORS supported), then two proxy fallbacks
          const offCgi = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&action=process&json=1&page_size=30&sort_by=unique_scans_n&lc=en&fields=product_name,brands,serving_quantity,serving_quantity_unit,nutriments`;
          const attempts = [
            offCgi,   // direct — works when OFf CORS headers are present
            `https://api.allorigins.win/raw?url=${encodeURIComponent(offCgi)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(offCgi)}`,
          ];

          let json = null;
          for (const url of attempts) {
            try {
              const res  = await fetch(url, { signal: AbortSignal.timeout(6000) });
              const text = await res.text();
              if (!text.trim().startsWith('{') && !text.trim().startsWith('[')) continue;
              const parsed = JSON.parse(text);
              if (Array.isArray(parsed.products)) { json = parsed; break; }
            } catch { continue; }
          }

          const apiItems = !json ? [] : (json.products || [])
            .filter(p => {
              const nm = p.nutriments || {};
              return p.product_name && (nm['energy-kcal_100g'] || nm['energy-kcal_serving'] || nm['energy-kcal']);
            })
            .filter(p => isRelevant(p.product_name || ''))
            .map(p => {
              const nm         = p.nutriments || {};
              const rawName    = (p.product_name || '').trim();
              const brand      = (p.brands || '').split(',')[0].trim();
              const nameStr    = brand && !rawName.toLowerCase().includes(brand.toLowerCase().split(/\s+/)[0])
                ? `${rawName} — ${brand}` : rawName;
              const per100Cal  = Number(nm['energy-kcal_100g']      || nm['energy-kcal'] || 0);
              const per100Pro  = Number(nm['proteins_100g']          || nm.proteins       || 0);
              const per100Carb = Number(nm['carbohydrates_100g']     || nm.carbohydrates  || 0);
              const per100Fat  = Number(nm['fat_100g']               || nm.fat            || 0);
              const srvCal     = Number(nm['energy-kcal_serving']    || 0);
              const srvPro     = Number(nm['proteins_serving']       || 0);
              const srvCarb    = Number(nm['carbohydrates_serving']  || 0);
              const srvFat     = Number(nm['fat_serving']            || 0);
              const srvQty     = parseFloat(p.serving_quantity)      || 0;
              const srvUnit    = (p.serving_quantity_unit || '').toLowerCase().trim();

              let servingUnit = 'grams', servingAmount = '100', calories, protein, carbs, fat;
              if (srvQty > 0 && (srvUnit === 'g' || srvUnit === 'ml' || srvUnit === '')) {
                servingUnit = 'grams'; servingAmount = String(srvQty);
                const sc = srvQty / 100;
                calories = String(Math.round(srvCal || per100Cal * sc));
                protein  = String(r1(srvPro  || per100Pro  * sc));
                carbs    = String(r1(srvCarb || per100Carb * sc));
                fat      = String(r1(srvFat  || per100Fat  * sc));
              } else if (srvQty > 0 && srvUnit === 'oz') {
                servingUnit = 'oz'; servingAmount = String(srvQty);
                const sc = (srvQty * OZ_TO_G) / 100;
                calories = String(Math.round(srvCal || per100Cal * sc));
                protein  = String(r1(srvPro  || per100Pro  * sc));
                carbs    = String(r1(srvCarb || per100Carb * sc));
                fat      = String(r1(srvFat  || per100Fat  * sc));
              } else if (srvCal > 0) {
                servingUnit = 'servings'; servingAmount = '1';
                calories = String(Math.round(srvCal)); protein = String(r1(srvPro));
                carbs    = String(r1(srvCarb)); fat = String(r1(srvFat));
              } else {
                calories = String(Math.round(per100Cal)); protein = String(r1(per100Pro));
                carbs    = String(r1(per100Carb)); fat = String(r1(per100Fat));
              }
              return { name: nameStr, rawName, servingUnit, servingAmount, quantity: servingAmount,
                       calories, protein, carbs, fat, displayCal: calories, _score: apiScore(rawName) };
            })
            .sort((a, b) => b._score - a._score)
            .filter((item, i, arr) => arr.findIndex(x => x.rawName.toLowerCase() === item.rawName.toLowerCase()) === i)
            .slice(0, 12);

          // Merge: My Foods first → local DB → unique API results (no duplicates)
          const usedNames = new Set([...myFoodHits, ...localHits].map(x => x.rawName.toLowerCase()));
          const freshApi  = apiItems.filter(x => !usedNames.has(x.rawName.toLowerCase()));
          const combined  = [...myFoodHits, ...freshLocal, ...freshApi].slice(0, 15);

          // Never show 'noresults' if we already have local hits — API failing silently is fine
          setDbResults(combined);
          setDbStatus(combined.length > 0 ? 'done' : initialResults.length > 0 ? 'done' : 'noresults');
        }, 700);

        return () => clearTimeout(searchTimer.current);
      }, [search]);

      const fillFromDb = (item) => {
        setForm({ name: item.name, servingUnit: item.servingUnit, servingAmount: item.servingAmount, quantity: item.servingAmount, calories: item.calories, protein: item.protein, carbs: item.carbs, fat: item.fat });
        setErrors({});
        setSearch('');
        setDbResults([]);
      };

      // ── Form helpers ───────────────────────────────────
      const set     = (k,v) => { setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:undefined})); };
      const setUnit = (unit) => { const d=unit==='grams'?'100':'1'; setForm(f=>({...f,servingUnit:unit,servingAmount:d,quantity:d})); };
      const unitLabel = form.servingUnit==='grams'?'g':form.servingUnit==='oz'?'oz':'srv';
      const mult = (Number(form.quantity)>0 && Number(form.servingAmount)>0) ? Number(form.quantity)/Number(form.servingAmount) : 0;
      const round1 = n => Math.round(n*10)/10;

      const validate = () => {
        const e = {};
        if (!Number(form.servingAmount)||Number(form.servingAmount)<=0) e.servingAmount='Must be > 0';
        if (!Number(form.quantity)||Number(form.quantity)<=0) e.quantity='Must be > 0';
        if (form.calories===''||isNaN(Number(form.calories))||Number(form.calories)<0) e.calories='Required';
        ['protein','carbs','fat'].forEach(k=>{ if(form[k]!==''&&(isNaN(Number(form[k]))||Number(form[k])<0)) e[k]='Invalid'; });
        return e;
      };

      const buildFood = (noSave = false) => ({
        name: form.name.trim() || 'Custom Food',
        servingUnit: form.servingUnit,
        servingAmount: Number(form.servingAmount), quantity: Number(form.quantity),
        caloriesPerServing: Number(form.calories)||0, proteinPerServing: Number(form.protein)||0,
        carbsPerServing: Number(form.carbs)||0, fatPerServing: Number(form.fat)||0,
        calories: round1((Number(form.calories)||0)*mult), protein: round1((Number(form.protein)||0)*mult),
        carbs: round1((Number(form.carbs)||0)*mult), fat: round1((Number(form.fat)||0)*mult),
        _noSave: noSave,
      });

      const submit = (ev) => {
        ev.preventDefault();
        const e = validate();
        if (Object.keys(e).length) { setErrors(e); return; }
        onAdd(buildFood(false));
      };

      const submitNoSave = () => {
        const e = validate();
        if (Object.keys(e).length) { setErrors(e); return; }
        onAdd(buildFood(true));
      };

      const fill = (f) => {
        const unit=f.servingUnit||'servings', amt=String(f.servingAmount??1);
        setForm({ name:f.name, servingUnit:unit, servingAmount:amt, quantity:amt,
          calories:String(f.calories??f.caloriesPerServing??''), protein:String(f.protein??f.proteinPerServing??''),
          carbs:String(f.carbs??f.carbsPerServing??''), fat:String(f.fat??f.fatPerServing??'') });
        setErrors({});
      };

      const showPreview = mult>0 && Number(form.calories)>0;

      return (
        <div className="modal-backdrop" onClick={e => e.target===e.currentTarget && !scanMode && onClose()}>
          <div className="modal">
            <div className="modal-drag-handle" />
            <div className="modal-header">
              <div className="modal-title">
                {scanMode ? <><Icon name="camera" size={16}/> Scan Barcode</> : <><Icon name={icon} size={15}/> Add to {label}</>}
              </div>
              <button className="modal-close" onClick={scanMode ? () => setScanMode(false) : onClose}>×</button>
            </div>

            {/* ── Scanner view ── */}
            {scanMode ? (
              <div className="scanner-body">
                <div id="barcode-reader" className="barcode-reader-div" />
                <div className="scanner-status">
                  {scanState==='scanning' && <span className="scan-hint">📦 Point camera at the barcode on the product</span>}
                  {scanState==='loading'  && <span className="scan-loading">⏳ Looking up product…</span>}
                  {scanState==='notfound' && (
                    <div style={{textAlign:'center'}}>
                      <div className="scan-notfound" style={{marginBottom:8}}>
                        Product not in database{lastBarcode ? ` (${lastBarcode})` : ''}.
                      </div>
                      <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                        <button className="btn-secondary" style={{fontSize:'0.8rem',padding:'5px 12px'}} onClick={restartScanner}>Retry</button>
                        <button className="btn-secondary" style={{fontSize:'0.8rem',padding:'5px 12px'}} onClick={() => setScanMode(false)}>Enter Manually</button>
                      </div>
                    </div>
                  )}
                  {scanState==='error' && (
                    <div style={{textAlign:'center'}}>
                      <div className="scan-error" style={{marginBottom:8}}>Network error — couldn't reach the database.</div>
                      <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                        <button className="btn-secondary" style={{fontSize:'0.8rem',padding:'5px 12px'}} onClick={restartScanner}>Retry</button>
                        <button className="btn-secondary" style={{fontSize:'0.8rem',padding:'5px 12px'}} onClick={() => setScanMode(false)}>Enter Manually</button>
                      </div>
                    </div>
                  )}
                  {scanState==='camerror' && <span className="scan-camerror">Camera access denied — enable it in browser settings</span>}
                </div>
                <div style={{padding:'4px 16px 16px'}}>
                  <button className="btn-secondary" style={{width:'100%'}} onClick={() => setScanMode(false)}>Cancel</button>
                </div>
              </div>
            ) : (
              <>
                {/* ── Scan button ── */}
                <div className="scan-section">
                  <button type="button" className="btn-scan" onClick={() => setScanMode(true)}>
                    <Icon name="camera" size={16} style={{marginRight:6}}/> Scan Product Barcode
                  </button>
                </div>

                {/* ── Food database search ── */}
                <div className="food-search-wrap">
                  <input
                    className="food-search-input"
                    type="text"
                    placeholder="🔍 Search food database…"
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                    autoComplete="off"
                  />
                </div>

                {/* ── Search results ── */}
                {(dbResults.length > 0 || dbStatus === 'loading' || dbStatus === 'error' || dbStatus === 'noresults' || dbStatus === 'short') && (
                  <div className="food-search-results">
                    {dbStatus === 'short'     && <div className="food-search-hint">Keep typing to search…</div>}
                    {dbStatus === 'loading'   && <div className="food-search-hint">Searching…</div>}
                    {dbStatus === 'noresults' && <div className="food-search-hint">No results — try a different term or enter manually</div>}
                    {dbStatus === 'error'     && <div className="food-search-hint">Search unavailable — check connection or enter manually</div>}
                    {dbResults.map((item, i) => (
                      <div key={i} className="food-result-item" onClick={() => fillFromDb(item)}
                        style={item._isMyFood ? {borderColor:'rgba(99,102,241,0.5)',background:'rgba(99,102,241,0.06)'} : {}}>
                        <div style={{minWidth:0}}>
                          <div className="food-result-name">
                            {item._isMyFood && <Icon name="star" size={11} strokeWidth={1.5} style={{marginRight:4,color:'var(--text-3)'}}/>}
                            {item.name}
                          </div>
                          <div className="food-result-meta">
                            P {item.protein}g · C {item.carbs}g · F {item.fat}g per {item.servingAmount}{item.servingUnit==='grams'?'g':item.servingUnit==='oz'?'oz':' srv'}
                            {item._isMyFood && <span style={{marginLeft:6,color:'var(--accent)',fontSize:'0.7rem',fontWeight:600}}>Saved</span>}
                          </div>
                        </div>
                        <div className="food-result-cal">{item.displayCal} kcal</div>
                      </div>
                    ))}
                  </div>
                )}

                {/* ── Manual form ── */}
                <form className="modal-form" onSubmit={submit}>
                  <div className={`form-group full ${errors.name?'has-error':''}`}>
                    <label>Food Name <span style={{color:'var(--text-3)',fontWeight:400}}>(optional)</span></label>
                    <input type="text" placeholder="e.g. Grilled chicken" value={form.name} onChange={e=>set('name',e.target.value)} autoFocus />
                    {errors.name && <span className="form-error">{errors.name}</span>}
                  </div>
                  <div className="form-group full">
                    <label>Serving Unit</label>
                    <div className="unit-toggle">
                      {['grams','oz','servings'].map(u=>(
                        <button key={u} type="button" className={`unit-btn ${form.servingUnit===u?'active':''}`} onClick={()=>setUnit(u)}>
                          {u==='grams'?'Grams':u==='oz'?'Ounces':'Servings'}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className={`form-group ${errors.servingAmount?'has-error':''}`}>
                    <label>Per (reference) <span className="unit-tag">{unitLabel}</span></label>
                    <input type="number" min="0.01" step="any" value={form.servingAmount} onChange={e=>set('servingAmount',e.target.value)} />
                    {errors.servingAmount && <span className="form-error">{errors.servingAmount}</span>}
                  </div>
                  <div className={`form-group ${errors.quantity?'has-error':''}`}>
                    <label>Amount consumed <span className="unit-tag">{unitLabel}</span></label>
                    <input type="number" min="0.01" step="any" value={form.quantity} onChange={e=>set('quantity',e.target.value)} />
                    {errors.quantity && <span className="form-error">{errors.quantity}</span>}
                  </div>
                  <div className={`form-group ${errors.calories?'has-error':''}`}>
                    <label>Calories per {form.servingAmount}{unitLabel}</label>
                    <input type="number" min="0" step="1" placeholder="0" value={form.calories} onChange={e=>set('calories',e.target.value)} />
                    {errors.calories && <span className="form-error">{errors.calories}</span>}
                  </div>
                  <div className={`form-group ${errors.protein?'has-error':''}`}>
                    <label><span style={{color:'var(--protein)'}}>Protein</span> per {form.servingAmount}{unitLabel} (g)</label>
                    <input type="number" min="0" step="0.1" placeholder="0" value={form.protein} onChange={e=>set('protein',e.target.value)} />
                    {errors.protein && <span className="form-error">{errors.protein}</span>}
                  </div>
                  <div className={`form-group ${errors.carbs?'has-error':''}`}>
                    <label><span style={{color:'var(--carbs)'}}>Carbs</span> per {form.servingAmount}{unitLabel} (g)</label>
                    <input type="number" min="0" step="0.1" placeholder="0" value={form.carbs} onChange={e=>set('carbs',e.target.value)} />
                    {errors.carbs && <span className="form-error">{errors.carbs}</span>}
                  </div>
                  <div className={`form-group ${errors.fat?'has-error':''}`}>
                    <label><span style={{color:'var(--fat)'}}>Fat</span> per {form.servingAmount}{unitLabel} (g)</label>
                    <input type="number" min="0" step="0.1" placeholder="0" value={form.fat} onChange={e=>set('fat',e.target.value)} />
                    {errors.fat && <span className="form-error">{errors.fat}</span>}
                  </div>
                  {showPreview && (
                    <div className="calc-preview">
                      <span className="calc-preview-label">Will log</span>
                      <strong>{Math.round((Number(form.calories)||0)*mult)} kcal</strong>
                      <span style={{color:'var(--protein)'}}>P {round1((Number(form.protein)||0)*mult)}g</span>
                      <span style={{color:'var(--carbs)'}}>C {round1((Number(form.carbs)||0)*mult)}g</span>
                      <span style={{color:'var(--fat)'}}>F {round1((Number(form.fat)||0)*mult)}g</span>
                    </div>
                  )}
                  <div className="modal-footer">
                    <button type="button" className="btn-secondary" onClick={onClose}>Cancel</button>
                    <button type="button" className="btn-secondary" onClick={submitNoSave}>Add Only</button>
                    <button type="submit" className="btn-primary">Add &amp; Save</button>
                  </div>
                </form>

                {/* ── Saved Foods ── */}
                {customFoods.length > 0 && (
                  <div className="my-foods">
                    <div className="my-foods-header">
                      <div className="quick-label">Saved Foods <span style={{color:'var(--text-3)',fontWeight:400,textTransform:'none',fontSize:'0.7rem',marginLeft:4}}>({customFoods.length})</span></div>
                      <input
                        className="my-foods-search"
                        type="text"
                        placeholder="Filter…"
                        value={myFoodsSearch}
                        onChange={e => { setMyFoodsSearch(e.target.value); setShowAllMyFoods(false); }}
                      />
                    </div>
                    {(() => {
                      const MF_LIMIT = 10;
                      const filtered = myFoodsSearch.trim()
                        ? customFoods.filter(f => f.name.toLowerCase().includes(myFoodsSearch.trim().toLowerCase()))
                        : customFoods;
                      const visible = (myFoodsSearch.trim() || showAllMyFoods) ? filtered : filtered.slice(0, MF_LIMIT);
                      if (filtered.length === 0) return <div className="my-foods-empty">No saved foods match "{myFoodsSearch}"</div>;
                      return (
                        <>
                          {visible.map(f => {
                            const unit = f.servingUnit==='grams'?'g':f.servingUnit==='oz'?'oz':' srv';
                            return (
                              <div key={f.id} className="mf-list-item" onClick={() => fill(f)}>
                                <div className="mf-list-left">
                                  <span className="mf-list-name">{f.name}</span>
                                  <span className="mf-list-sub">
                                    {Math.round(f.calories)} kcal · P {Math.round(f.protein)}g · C {Math.round(f.carbs)}g · F {Math.round(f.fat)}g
                                    <span style={{color:'var(--text-3)'}}> / {f.servingAmount}{unit}</span>
                                  </span>
                                </div>
                                <button className="mf-list-del" onClick={e => { e.stopPropagation(); onDeleteCustomFood(f.id); }} title="Remove">×</button>
                              </div>
                            );
                          })}
                          {!myFoodsSearch.trim() && filtered.length > MF_LIMIT && (
                            <button className="mf-expand-btn" onClick={() => setShowAllMyFoods(s => !s)}>
                              {showAllMyFoods
                                ? <><Icon name="upload" size={11}/> Show less</>
                                : <><Icon name="download" size={11}/> {filtered.length - MF_LIMIT} more</>
                              }
                            </button>
                          )}
                        </>
                      );
                    })()}
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    // ── Goals Modal ────────────────────────────────────
    function GoalsModal({ goals, onSave, onClose }) {
      const [form, setForm] = useState({ calories:String(goals.calories), protein:String(goals.protein), carbs:String(goals.carbs), fat:String(goals.fat) });
      const [errors, setErrors] = useState({});

      const set = (k,v) => { setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:undefined})); };

      const validate = () => {
        const e = {};
        ['calories','protein','carbs','fat'].forEach(k => { const n=Number(form[k]); if(form[k]===''||isNaN(n)||n<1) e[k]='Enter a value > 0'; });
        return e;
      };

      const submit = (ev) => {
        ev.preventDefault();
        const e = validate();
        if (Object.keys(e).length) { setErrors(e); return; }
        onSave({ calories:Number(form.calories), protein:Number(form.protein), carbs:Number(form.carbs), fat:Number(form.fat) });
      };

      const pCal = (Number(form.protein)||0)*4, cCal = (Number(form.carbs)||0)*4, fCal = (Number(form.fat)||0)*9;
      const total = Number(form.calories)||1;
      const pp = Math.round((pCal/total)*100), cp = Math.round((cCal/total)*100), fp = Math.round((fCal/total)*100);

      return (
        <div className="modal-backdrop" onClick={e => e.target===e.currentTarget && onClose()}>
          <div className="modal">
            <div className="modal-drag-handle" />
            <div className="modal-header">
              <div className="modal-title"><Icon name="target" size={16} style={{marginRight:6}}/>Daily Goals</div>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <form className="modal-form" onSubmit={submit}>
              <div className={`form-group full ${errors.calories?'has-error':''}`}>
                <label><span style={{color:'var(--calories)'}}>Calories</span> (kcal/day)</label>
                <input type="number" min="1" step="1" value={form.calories} onChange={e=>set('calories',e.target.value)} autoFocus />
                {errors.calories && <span className="form-error">{errors.calories}</span>}
              </div>
              <div className={`form-group ${errors.protein?'has-error':''}`}>
                <label><span style={{color:'var(--protein)'}}>Protein</span> (g/day)</label>
                <input type="number" min="1" step="1" value={form.protein} onChange={e=>set('protein',e.target.value)} />
                {errors.protein && <span className="form-error">{errors.protein}</span>}
              </div>
              <div className={`form-group ${errors.carbs?'has-error':''}`}>
                <label><span style={{color:'var(--carbs)'}}>Carbs</span> (g/day)</label>
                <input type="number" min="1" step="1" value={form.carbs} onChange={e=>set('carbs',e.target.value)} />
                {errors.carbs && <span className="form-error">{errors.carbs}</span>}
              </div>
              <div className={`form-group ${errors.fat?'has-error':''}`}>
                <label><span style={{color:'var(--fat)'}}>Fat</span> (g/day)</label>
                <input type="number" min="1" step="1" value={form.fat} onChange={e=>set('fat',e.target.value)} />
                {errors.fat && <span className="form-error">{errors.fat}</span>}
              </div>
              {(pCal+cCal+fCal)>0 && (
                <div className="macro-breakdown full">
                  <div className="macro-breakdown-title">Macro Split (from grams entered)</div>
                  <div className="macro-breakdown-bar">
                    <div style={{width:`${pp}%`, background:'var(--protein)'}} />
                    <div style={{width:`${cp}%`, background:'var(--carbs)'}} />
                    <div style={{width:`${fp}%`, background:'var(--fat)'}} />
                  </div>
                  <div className="macro-breakdown-labels">
                    <span style={{color:'var(--protein)'}}>P {pp}%</span>
                    <span style={{color:'var(--carbs)'}}>C {cp}%</span>
                    <span style={{color:'var(--fat)'}}>F {fp}%</span>
                    <span className="macro-breakdown-total">{pCal+cCal+fCal} macro kcal</span>
                  </div>
                </div>
              )}
              <div className="modal-footer">
                <button type="button" className="btn-secondary" onClick={onClose}>Cancel</button>
                <button type="submit" className="btn-primary">Save Goals</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ── Header ─────────────────────────────────────────
    function Header({ currentDate, weekDates, view, onViewChange, onNavigateDay, onNavigateWeek, onToday, onOpenGoals, onExport, onImport }) {
      const isDay = view === 'day';
      return (
        <header className="header">
          <div className="header-top">
            <div className="brand">
              <span className="brand-icon"><Icon name="zap" size={18} strokeWidth={1.5}/></span>
              <span className="brand-name">MacroTrack</span>
            </div>
            <div className="header-actions">
              <button className="btn-data" onClick={onExport} title="Download a backup of all your data"><Icon name="download" size={13} style={{marginRight:4}}/>Backup</button>
              <button className="btn-data restore" onClick={onImport} title="Restore from a backup file"><Icon name="upload" size={13} style={{marginRight:4}}/>Restore</button>
              <button className="btn-goals" onClick={onOpenGoals}><Icon name="target" size={13} style={{marginRight:4}}/>Goals</button>
            </div>
          </div>
          <div className="header-nav">
            <div className="view-toggle">
              <button className={`view-btn ${isDay?'active':''}`} onClick={() => onViewChange('day')}>Day</button>
              <button className={`view-btn ${!isDay?'active':''}`} onClick={() => onViewChange('week')}>Week</button>
            </div>
            <div className="date-nav">
              <button className="nav-arrow" onClick={() => isDay ? onNavigateDay(-1) : onNavigateWeek(-1)}>‹</button>
              <div className="date-label">{isDay ? fmtLong(currentDate) : weekRange(weekDates)}</div>
              <button className="nav-arrow" onClick={() => isDay ? onNavigateDay(1) : onNavigateWeek(1)}>›</button>
            </div>
            {!isToday(currentDate) && <button className="today-btn" onClick={onToday}>Today</button>}
          </div>
        </header>
      );
    }

    // ── App ────────────────────────────────────────────
    function App() {
      const [data, setData] = useState(() => { const d = loadData(); return d || { goals: DEFAULT_GOALS, entries: {}, customFoods: [], weights: {}, weightUnit: 'lbs', burned: {} }; });
      const [currentDate, setCurrentDate] = useState(fmtDate(new Date()));
      const [view, setView] = useState('day');
      const [addModal, setAddModal] = useState(null);
      const [goalsOpen, setGoalsOpen] = useState(false);

      useEffect(() => { saveData(data); }, [data]);

      const getDayEntries = (d) => data.entries[d] || emptyDay();
      const getDayTotals  = (d) => sumMacros(Object.values(getDayEntries(d)).flat());
      const getDayBurned  = (d) => (data.burned || {})[d] || 0;

      const weekDates  = getWeekDates(currentDate);
      const weekTotals = weekDates.reduce((a,d) => { const t=getDayTotals(d); return { calories:a.calories+t.calories, protein:a.protein+t.protein, carbs:a.carbs+t.carbs, fat:a.fat+t.fat }; }, {calories:0,protein:0,carbs:0,fat:0});
      const weekBurnedBonus = weekDates.reduce((sum, d) => sum + Math.round(getDayBurned(d) * 0.5), 0);

      const addFood = (meal, food) => {
        setData(prev => {
          const day = prev.entries[currentDate] || emptyDay();
          const logEntry = { ...food, id: `${Date.now()}-${Math.random()}` };
          delete logEntry._noSave;

          if (food._noSave) {
            // Add to log only — do not persist to My Foods
            return {
              ...prev,
              entries: { ...prev.entries, [currentDate]: { ...day, [meal]: [...day[meal], logEntry] } },
            };
          }

          // Store per-serving reference in customFoods (not the scaled values)
          const ref = {
            name:          food.name,
            servingUnit:   food.servingUnit   || 'servings',
            servingAmount: food.servingAmount ?? 1,
            calories: food.caloriesPerServing ?? food.calories,
            protein:  food.proteinPerServing  ?? food.protein,
            carbs:    food.carbsPerServing    ?? food.carbs,
            fat:      food.fatPerServing      ?? food.fat,
          };
          const existing = (prev.customFoods || []);
          const idx = existing.findIndex(f => f.name.toLowerCase() === ref.name.toLowerCase());
          const refWithId = { ...ref, id: idx >= 0 ? existing[idx].id : `cf-${Date.now()}-${Math.random()}` };
          const newCustomFoods = idx >= 0
            ? [refWithId, ...existing.filter((_, i) => i !== idx)]
            : [refWithId, ...existing];
          return {
            ...prev,
            entries: { ...prev.entries, [currentDate]: { ...day, [meal]: [...day[meal], logEntry] } },
            customFoods: newCustomFoods,
          };
        });
        setAddModal(null);
      };

      const removeFood = (meal, id) => {
        setData(prev => {
          const day = prev.entries[currentDate] || emptyDay();
          return { ...prev, entries: { ...prev.entries, [currentDate]: { ...day, [meal]: day[meal].filter(f=>f.id!==id) } } };
        });
      };

      const deleteCustomFood = (id) => {
        setData(prev => ({ ...prev, customFoods: (prev.customFoods || []).filter(f => f.id !== id) }));
      };

      const updateWeight = (date, val) => {
        setData(prev => {
          const weights = { ...prev.weights };
          if (val === '' || val === null) delete weights[date];
          else weights[date] = Number(val);
          return { ...prev, weights };
        });
      };

      const updateWeightUnit = (unit) => {
        setData(prev => ({ ...prev, weightUnit: unit }));
      };

      const updateBurned = (date, val) => {
        setData(prev => {
          const burned = { ...(prev.burned || {}) };
          if (!val || val <= 0) delete burned[date];
          else burned[date] = val;
          return { ...prev, burned };
        });
      };

      const [toast, setToast] = useState(null);
      const showToast = (msg, error = false) => {
        setToast({ msg, error });
        setTimeout(() => setToast(null), 3000);
      };

      const importRef = React.useRef(null);

      const exportData = () => {
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `macrotrack-backup-${fmtDate(new Date())}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleImportFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!imported.goals || !imported.entries) throw new Error('Invalid file');
            setData(imported);
            showToast('✓ Data restored successfully');
          } catch {
            showToast('Could not read file — make sure it is a MacroTrack backup', true);
          }
          e.target.value = '';
        };
        reader.readAsText(file);
      };

      return (
        <div className="app">
          <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImportFile} />
          <Header
            currentDate={currentDate} weekDates={weekDates} view={view}
            onViewChange={setView}
            onNavigateDay={n => setCurrentDate(d => addDays(d,n))}
            onNavigateWeek={n => setCurrentDate(d => addDays(d,n*7))}
            onToday={() => setCurrentDate(fmtDate(new Date()))}
            onOpenGoals={() => setGoalsOpen(true)}
            onExport={exportData}
            onImport={() => importRef.current.click()}
          />
          <main className="main">
            {view==='day'
              ? <DayView entries={getDayEntries(currentDate)} totals={getDayTotals(currentDate)} goals={data.goals} burned={getDayBurned(currentDate)} onUpdateBurned={val=>updateBurned(currentDate,val)} onAddFood={m=>setAddModal({meal:m})} onRemoveFood={removeFood} />
              : <WeekView weekDates={weekDates} getDayTotals={getDayTotals} weekTotals={weekTotals} goals={data.goals} currentDate={currentDate} onSelectDate={d=>{setCurrentDate(d);setView('day');}} weights={data.weights||{}} weightUnit={data.weightUnit||'lbs'} onUpdateWeight={updateWeight} onUpdateWeightUnit={updateWeightUnit} getDayBurned={getDayBurned} weekBurnedBonus={weekBurnedBonus} />
            }
          </main>
          {addModal && <AddFoodModal meal={addModal.meal} onAdd={food=>addFood(addModal.meal,food)} onClose={()=>setAddModal(null)} customFoods={data.customFoods || []} onDeleteCustomFood={deleteCustomFood} />}
          {goalsOpen && <GoalsModal goals={data.goals} onSave={g=>{setData(p=>({...p,goals:g}));setGoalsOpen(false);}} onClose={()=>setGoalsOpen(false)} />}
          {toast && <div className={`import-toast ${toast.error ? 'error' : ''}`}>{toast.msg}</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
