<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MacroTrack — Calorie & Macro Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* White Marble */
      --bg:       #F0EDE8;
      --surface:  #FFFFFF;
      --surface2: #F7F5F2;
      --surface3: #ECEAE5;
      --border:   rgba(0,0,0,0.07);
      --border2:  rgba(0,0,0,0.05);
      --sep:      rgba(0,0,0,0.07);
      --fill:     rgba(0,0,0,0.05);
      --fill2:    rgba(0,0,0,0.025);

      --text:     #111111;
      --text-2:   rgba(0,0,0,0.50);
      --text-3:   rgba(0,0,0,0.28);

      /* Palette adjusted for light bg */
      --blue:     #1E72C8;
      --green:    #1F9E5A;
      --orange:   #C4661A;
      --red:      #C03030;
      --purple:   #7040BC;

      --accent:   #1E72C8;
      --calories: #C4661A;
      --protein:  #1E72C8;
      --carbs:    #1F9E5A;
      --fat:      #7040BC;
      --danger:   #C03030;

      --r:    16px;
      --r-sm: 12px;
      --r-lg: 22px;
      --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 24px rgba(0,0,0,0.07);
    }

    html { font-size: 16px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.45;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'cv11', 'ss01'; /* Inter: open digits, alt a */
    }

    /* Tabular numbers everywhere figures appear — keeps columns aligned */
    .summary-cal-num, .macro-bar-value, .week-cal-num, .week-day-cals,
    .meal-cal-badge, .food-macro, .calc-preview strong, .calc-preview span,
    .weight-stat-val, .burned-input, .week-macro-values strong,
    input[type=number] {
      font-variant-numeric: tabular-nums;
    }

    .app { max-width: 600px; margin: 0 auto; }
    .main { padding: 0 16px 96px; }

    /* ── Header ── */
    .header {
      background: rgba(240,237,232,0.88);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--sep);
      padding: 12px 20px 14px; position: sticky; top: 0; z-index: 100;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand-icon { display: flex; align-items: center; color: var(--text-2); }
    .brand-name {
      font-size: 1.15rem; font-weight: 700; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #111 30%, rgba(0,0,0,0.55) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-actions { display: flex; align-items: center; gap: 6px; }
    .btn-goals {
      display: flex; align-items: center; gap: 5px; padding: 7px 13px;
      background: var(--fill); border: none;
      border-radius: 99px; color: var(--accent); font-size: 0.84rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; font-family: inherit;
    }
    .btn-goals:hover { opacity: 0.7; }
    .btn-data {
      display: flex; align-items: center; gap: 4px; padding: 7px 11px;
      background: var(--fill); border: none;
      border-radius: 99px; color: var(--text-2); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: opacity 0.15s; font-family: inherit; white-space: nowrap;
    }
    .btn-data:hover { opacity: 0.65; }
    .btn-data.restore:hover { color: var(--text); opacity: 1; }
    .import-toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); color: var(--text);
      padding: 12px 22px; border-radius: 14px; font-size: 0.88rem; font-weight: 600;
      z-index: 999; animation: toast-in 0.25s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
    }
    .import-toast.error { color: var(--danger); }
    @keyframes toast-in {
      from { transform: translateX(-50%) translateY(10px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0);    opacity: 1; }
    }
    .header-nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    /* iOS Segmented Control */
    .view-toggle {
      display: flex; background: var(--surface3); border-radius: 9px;
      padding: 2px; border: none; flex-shrink: 0;
    }
    .view-btn {
      padding: 5px 18px; border-radius: 7px; font-size: 0.84rem; font-weight: 500;
      cursor: pointer; background: transparent; border: none; color: var(--text-2);
      transition: all 0.2s ease; font-family: inherit;
    }
    .view-btn.active {
      background: var(--surface2); color: var(--text); font-weight: 600;
      box-shadow: 0 1px 5px rgba(0,0,0,0.45), 0 0 1px rgba(0,0,0,0.2);
    }
    .date-nav { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
    .nav-arrow {
      width: 30px; height: 30px; background: var(--fill); border: none;
      border-radius: 50%; color: var(--accent); font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s; line-height: 1; font-family: inherit;
    }
    .nav-arrow:hover { opacity: 0.6; }
    .date-label { font-size: 0.875rem; font-weight: 600; min-width: 0; text-align: center; flex: 1; }
    .today-btn {
      padding: 5px 13px; background: var(--fill); border: none;
      border-radius: 99px; color: var(--accent); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; font-family: inherit; flex-shrink: 0;
    }
    .today-btn:hover { opacity: 0.65; }

    /* ── Day View ── */
    .day-view { display: flex; flex-direction: column; gap: 14px; padding-top: 16px; }
    .summary-card {
      background: var(--surface); border-radius: var(--r-lg);
      padding: 20px; display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;
      box-shadow: var(--card-shadow);
    }
    .summary-cal { display: flex; align-items: center; gap: 14px; flex-shrink: 0; min-width: 0; }
    .summary-cal-ring {
      width: 88px; height: 88px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; transition: background 0.4s;
    }
    .summary-cal-inner {
      width: 70px; height: 70px; background: var(--surface); border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .summary-cal-num { font-size: 1.1rem; font-weight: 700; line-height: 1; letter-spacing: -0.5px; }
    .summary-cal-sub { font-size: 0.68rem; color: var(--text-3); margin-top: 2px; font-weight: 500; }
    .summary-cal-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; max-width: 150px; }
    .summary-cal-label { font-size: 0.7rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; }
    .summary-remaining { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .summary-goal-text { font-size: 0.75rem; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .macro-bars { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 140px; }
    .macro-bar-wrap { display: flex; flex-direction: column; gap: 5px; }
    .macro-bar-header { display: flex; justify-content: space-between; align-items: center; }
    .macro-bar-label { font-size: 0.76rem; font-weight: 600; }
    .macro-bar-value { font-size: 0.8rem; }
    .macro-bar-goal { color: var(--text-3); font-size: 0.76rem; }
    .progress-track { height: 5px; background: var(--fill); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

    /* ── Burned Card ── */
    .burned-card {
      background: var(--surface); border-radius: var(--r);
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      box-shadow: var(--card-shadow);
    }
    .burned-icon { font-size: 1.3rem; flex-shrink: 0; }
    .burned-info { flex: 1; min-width: 0; }
    .burned-label { font-size: 0.88rem; font-weight: 600; }
    .burned-sub   { font-size: 0.74rem; color: var(--text-2); margin-top: 1px; }
    .burned-boost { font-size: 0.74rem; color: var(--orange); font-weight: 600; margin-top: 1px; }
    .burned-input-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .burned-input {
      width: 80px; padding: 7px 10px; text-align: right;
      background: var(--fill); border: none;
      border-radius: 10px; color: var(--text); font-size: 0.9rem;
      outline: none; -moz-appearance: textfield; font-family: inherit;
    }
    .burned-input::-webkit-outer-spin-button,
    .burned-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .burned-input:focus { background: var(--surface2); outline: 1px solid rgba(255,255,255,0.18); outline-offset: 0; }
    .burned-unit { font-size: 0.8rem; color: var(--text-2); }
    .summary-goal-bonus { color: var(--orange); font-weight: 600; }

    /* ── Meals Grid ── */
    .meals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 560px) { .meals-grid { grid-template-columns: 1fr; } }

    /* ── Meal Card ── */
    .meal-card {
      background: var(--surface); border-radius: var(--r);
      overflow: hidden; box-shadow: var(--card-shadow);
    }
    .meal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 14px 10px; cursor: pointer; user-select: none;
    }
    .meal-title { display: flex; align-items: center; gap: 8px; }
    .meal-emoji { display: flex; align-items: center; color: var(--text-2); }
    .meal-label { font-weight: 600; font-size: 0.9rem; }
    .meal-count {
      font-size: 0.7rem; color: var(--text-3); background: var(--fill);
      border-radius: 99px; padding: 2px 8px; font-weight: 500;
    }
    .meal-header-right { display: flex; align-items: center; gap: 8px; }
    .meal-cal-badge { font-size: 0.78rem; font-weight: 700; color: var(--calories); }
    .meal-chevron {
      color: var(--text-3); font-size: 0.78rem; display: flex; align-items: center;
      transition: transform 0.2s ease;
    }
    .meal-chevron.open { transform: rotate(90deg); }
    .meal-macro-row { display: flex; gap: 6px; padding: 0 14px 10px; }
    .macro-chip { font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
    .macro-chip.protein { background: rgba(30,114,200,0.10);  color: var(--protein); }
    .macro-chip.carbs   { background: rgba(31,158,90,0.10);   color: var(--carbs); }
    .macro-chip.fat     { background: rgba(112,64,188,0.10);  color: var(--fat); }
    /* iOS inset list style */
    .food-list { padding: 0 10px; display: flex; flex-direction: column; }
    .food-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 6px; transition: background 0.1s;
    }
    .food-item + .food-item { border-top: 0.5px solid var(--sep); }
    .food-item-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .food-name { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .food-macros { display: flex; gap: 8px; flex-wrap: wrap; }
    .food-macro { font-size: 0.7rem; color: var(--text-3); }
    .food-macro.cal  { color: var(--calories); font-weight: 600; }
    .food-macro.prot { color: var(--protein); }
    .food-macro.carb { color: var(--carbs); }
    .food-macro.fat  { color: var(--fat); }
    .remove-btn {
      width: 26px; height: 26px; background: var(--fill); border: none;
      border-radius: 50%; color: var(--text-3); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: all 0.15s; line-height: 1; font-family: inherit; opacity: 0.55;
    }
    .food-item:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { background: rgba(192,48,48,0.10); color: var(--red); }
    .add-food-btn {
      width: 100%; padding: 12px 10px; background: transparent; border: none;
      border-top: 0.5px solid var(--sep); color: var(--accent); font-size: 0.875rem;
      font-weight: 600; cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 6px; transition: opacity 0.15s;
      margin-top: 4px; font-family: inherit;
    }
    .add-food-btn:hover { opacity: 0.65; }
    .add-food-plus { font-size: 1rem; line-height: 1; }

    /* ── Week View ── */
    .week-view { display: flex; flex-direction: column; gap: 14px; padding-top: 16px; }
    .week-summary-card {
      background: var(--surface); border-radius: var(--r-lg); padding: 20px;
      box-shadow: var(--card-shadow);
    }
    .week-summary-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .week-summary-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.3px; }
    .week-summary-sub { font-size: 0.76rem; color: var(--text-2); margin-top: 2px; }
    .week-cal-badge { text-align: right; display: flex; flex-direction: column; gap: 2px; }
    .week-cal-num { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; }
    .week-cal-label { font-size: 0.76rem; color: var(--text-2); }
    .week-cal-remaining { font-size: 0.8rem; font-weight: 600; }
    .week-macro-stack { display: flex; flex-direction: column; gap: 10px; }
    .week-macro-row { display: flex; align-items: center; gap: 10px; }
    .week-macro-label { font-size: 0.76rem; font-weight: 600; width: 56px; flex-shrink: 0; }
    .week-macro-bar-track { flex: 1; height: 5px; background: var(--fill); border-radius: 99px; overflow: hidden; }
    .week-macro-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
    .week-macro-values { font-size: 0.78rem; min-width: 0; text-align: right; white-space: nowrap; }
    .week-macro-goal { color: var(--text-3); font-size: 0.72rem; }
    .week-days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .week-day-card {
      background: var(--surface); border-radius: 12px; padding: 10px 4px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: all 0.2s ease; font-family: inherit; border: none;
      box-shadow: var(--card-shadow);
    }
    .week-day-card:hover { transform: translateY(-1px); }
    .week-day-card.selected { background: var(--surface); box-shadow: 0 0 0 1.5px var(--accent), 0 4px 20px rgba(30,114,200,0.12); }
    .week-day-card.selected .week-day-abbr,
    .week-day-card.selected .week-day-date,
    .week-day-card.selected .week-day-unit { color: var(--text-2); }
    .week-day-card.selected .week-day-cals { color: var(--text); }
    .week-day-abbr { font-size: 0.68rem; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.3px; }
    .week-day-card.today .week-day-abbr { color: var(--accent); }
    .week-day-card.selected .week-day-abbr { color: var(--accent); }
    .week-day-date { font-size: 0.65rem; color: var(--text-3); }
    .week-bar-track {
      width: 24px; height: 52px; background: var(--fill); border-radius: 6px;
      overflow: hidden; display: flex; align-items: flex-end; margin: 3px 0;
    }
    .week-day-card.selected .week-bar-track { background: rgba(0,0,0,0.06); }
    .week-bar-fill { width: 100%; border-radius: 6px; transition: height 0.4s cubic-bezier(0.4,0,0.2,1); min-height: 3px; }
    .week-day-cals { font-size: 0.72rem; font-weight: 700; line-height: 1; }
    .week-day-cals.over { color: var(--red); }
    .week-day-cals.empty { color: var(--text-3); }
    .week-day-unit { font-size: 0.6rem; color: var(--text-3); }
    .week-day-goal-line { text-align: center; color: var(--text-3); font-size: 0.76rem; padding-bottom: 4px; }

    /* ── Weight Tracker ── */
    .weight-tracker { background: var(--surface); border-radius: var(--r-lg); padding: 20px; box-shadow: var(--card-shadow); }
    .weight-tracker-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .weight-tracker-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.3px; }
    .weight-tracker-sub { font-size: 0.76rem; color: var(--text-2); margin-top: 2px; }
    .weight-unit-toggle { display: flex; background: var(--surface3); border-radius: 8px; }
    .weight-unit-btn { padding: 5px 14px; border: none; background: transparent; color: var(--text-2); font-size: 0.8rem; font-weight: 500; cursor: pointer; border-radius: 6px; transition: all 0.2s; font-family: inherit; }
    .weight-unit-btn.active { background: var(--surface2); color: var(--text); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
    .weight-entry-card { background: var(--fill2); border-radius: var(--r-sm); padding: 14px; margin-bottom: 14px; }
    .weight-entry-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.85rem; font-weight: 600; }
    .weight-entry-date { font-size: 0.76rem; color: var(--text-2); font-weight: 400; }
    .weight-entry-row { display: flex; gap: 8px; align-items: center; }
    .weight-entry-input {
      flex: 1; padding: 9px 12px; background: var(--surface2); border: none;
      border-radius: var(--r-sm); color: var(--text); font-size: 0.95rem; outline: none;
      transition: all 0.15s; font-family: inherit;
    }
    .weight-entry-input:focus { outline: 1px solid rgba(255,255,255,0.2); outline-offset: 0; }
    .weight-entry-input::placeholder { color: var(--text-3); }
    .weight-entry-save { padding: 9px 18px !important; white-space: nowrap; }
    .weight-entry-hint { font-size: 0.76rem; color: var(--text-2); margin-top: 8px; }
    .weight-chart-wrap { margin-bottom: 16px; }
    .weight-chart-label { font-size: 0.68rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .weight-chart-svg { width: 100%; height: auto; display: block; }
    .chart-no-data { font-size: 0.76rem; color: var(--text-3); text-align: center; padding: 24px 0 8px; font-style: italic; }
    .weight-stats { display: flex; gap: 0; padding-top: 14px; border-top: 0.5px solid var(--sep); flex-wrap: wrap; }
    .weight-stat { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 70px; padding: 0 14px; border-right: 0.5px solid var(--sep); }
    .weight-stat:first-child { padding-left: 0; }
    .weight-stat:last-child { border-right: none; }
    .weight-stat-label { font-size: 0.65rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .weight-stat-val { font-size: 1rem; font-weight: 700; }

    /* ── Modals — iOS bottom sheet ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200; padding: 0; animation: fade-in 0.2s ease;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface); width: 100%; max-width: 600px;
      border-radius: 20px 20px 0 0; max-height: 92vh;
      overflow-y: auto; animation: sheet-up 0.35s cubic-bezier(0.32,0.72,0,1);
      box-shadow: 0 -2px 40px rgba(0,0,0,0.12);
    }
    @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    /* Drag handle */
    .modal-drag-handle {
      width: 36px; height: 4px; background: rgba(0,0,0,0.12);
      border-radius: 2px; margin: 10px auto 0;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px 14px; border-bottom: 0.5px solid var(--sep);
    }
    .modal-title { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .modal-close {
      width: 28px; height: 28px; background: var(--fill); border: none;
      border-radius: 50%; color: var(--text-2); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: opacity 0.15s;
      line-height: 1; font-family: inherit;
    }
    .modal-close:hover { opacity: 0.6; }
    .food-search-wrap { padding: 12px 16px; border-bottom: 0.5px solid var(--sep); }
    .food-search-input {
      width: 100%; padding: 10px 14px; background: var(--fill);
      border: none; border-radius: 12px;
      color: var(--text); font-size: 0.95rem; outline: none; font-family: inherit;
    }
    .food-search-input:focus { background: var(--surface2); outline: 1.5px solid var(--accent); outline-offset: 0; }
    .food-search-results { padding: 6px 16px 10px; border-bottom: 0.5px solid var(--sep); max-height: 220px; overflow-y: auto; }
    .food-search-hint { font-size: 0.76rem; color: var(--text-3); padding: 6px 0; }
    .food-result-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; border-radius: 12px; cursor: pointer; border: none;
      margin-bottom: 4px; background: var(--fill2); transition: background 0.15s;
    }
    .food-result-item:hover { background: var(--fill); }
    .food-result-name { font-size: 0.88rem; font-weight: 500; }
    .food-result-meta { font-size: 0.72rem; color: var(--text-2); margin-top: 2px; }
    .food-result-cal { font-size: 0.82rem; font-weight: 700; color: var(--calories); flex-shrink: 0; margin-left: 10px; }

    .quick-label { font-size: 0.7rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .quick-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .quick-chip {
      padding: 5px 12px; background: var(--fill2); border: none;
      border-radius: 99px; color: var(--text-2); font-size: 0.75rem; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .quick-chip:hover { background: var(--fill); color: var(--text); }

    /* ── My Foods ── */
    .my-foods { padding: 10px 14px 12px; border-top: 0.5px solid var(--sep); }
    .my-foods-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .my-foods-search {
      padding: 5px 12px; background: var(--fill); border: none;
      border-radius: 99px; color: var(--text); font-size: 0.75rem; outline: none;
      transition: all 0.2s; font-family: inherit; width: 100px;
    }
    .my-foods-search:focus { background: var(--surface2); outline: 1.5px solid var(--accent); outline-offset: 0; width: 130px; }
    .my-foods-empty { font-size: 0.75rem; color: var(--text-3); font-style: italic; padding: 4px 2px 6px; }
    .mf-list-item {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; padding: 7px 6px; border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .mf-list-item:hover { background: var(--fill); }
    .mf-list-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
    .mf-list-name { font-size: 0.84rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mf-list-sub { font-size: 0.71rem; color: var(--text-2); }
    .mf-list-del {
      flex-shrink: 0; background: transparent; border: none;
      color: var(--text-3); font-size: 1rem; cursor: pointer; line-height: 1;
      padding: 4px 6px; border-radius: 6px; transition: all 0.15s; font-family: inherit;
    }
    .mf-list-del:hover { color: var(--red); background: rgba(192,48,48,0.08); }
    .mf-expand-btn {
      display: flex; align-items: center; justify-content: center; gap: 4px;
      width: 100%; padding: 6px 0 4px; background: none; border: none;
      border-top: 0.5px solid var(--sep); margin-top: 2px;
      font-size: 0.75rem; font-weight: 500; color: var(--accent);
      cursor: pointer; font-family: inherit;
    }
    .mf-expand-btn:hover { opacity: 0.7; }

    /* ── Serving unit toggle ── */
    .unit-toggle { display: flex; background: var(--surface3); border-radius: var(--r-sm); width: 100%; }
    .unit-btn { flex: 1; padding: 9px 4px; border: none; background: transparent; color: var(--text-2); font-size: 0.83rem; font-weight: 500; cursor: pointer; border-radius: calc(var(--r-sm) - 2px); transition: all 0.2s; font-family: inherit; }
    .unit-btn.active { background: var(--surface2); color: var(--text); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
    .unit-tag { font-size: 0.7rem; color: var(--accent); font-weight: 600; margin-left: 4px; }
    .calc-preview {
      grid-column: 1/-1; background: var(--fill2); border-radius: var(--r-sm); padding: 10px 12px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .calc-preview-label { font-size: 0.7rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
    .calc-preview strong { font-size: 0.9rem; color: var(--calories); }
    .calc-preview span { font-size: 0.82rem; font-weight: 600; }
    .food-serving-tag { font-size: 0.7rem; color: var(--text-3); background: var(--fill); border-radius: 5px; padding: 1px 5px; margin-left: 4px; }
    .modal-form { padding: 14px 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 0.74rem; font-weight: 600; color: var(--text-2); }
    .form-group input {
      padding: 10px 12px; background: var(--fill); border: none;
      border-radius: var(--r-sm); color: var(--text); font-size: 0.9rem; outline: none;
      transition: all 0.15s; font-family: inherit; width: 100%;
    }
    .form-group input:focus { background: var(--surface2); outline: 1.5px solid var(--accent); outline-offset: 0; }
    .form-group.has-error input { outline: 1px solid var(--red); background: rgba(192,48,48,0.05); }
    .form-error { font-size: 0.7rem; color: var(--red); }
    .macro-breakdown { background: var(--fill2); border-radius: var(--r-sm); padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .macro-breakdown-title { font-size: 0.7rem; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.8px; }
    .macro-breakdown-bar { height: 7px; border-radius: 99px; overflow: hidden; display: flex; }
    .macro-breakdown-bar > div { height: 100%; transition: width 0.3s; }
    .macro-breakdown-labels { display: flex; gap: 12px; align-items: center; font-size: 0.78rem; font-weight: 600; }
    .macro-breakdown-total { margin-left: auto; color: var(--text-2); font-weight: 400; font-size: 0.72rem; }
    .modal-footer {
      grid-column: 1 / -1; display: flex; justify-content: flex-end; gap: 8px;
      border-top: 0.5px solid var(--sep); padding-top: 14px; margin-top: 4px;
    }
    .btn-primary {
      padding: 10px 22px; background: var(--accent); border: none; border-radius: 12px;
      color: #fff; font-size: 0.88rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; font-family: inherit;
    }
    .btn-primary:hover { opacity: 0.8; }
    .btn-secondary {
      padding: 10px 16px; background: var(--fill); border: none;
      border-radius: 12px; color: var(--text-2); font-size: 0.88rem; font-weight: 500;
      cursor: pointer; transition: opacity 0.15s; font-family: inherit;
    }
    .btn-secondary:hover { opacity: 0.65; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 99px; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 0.4; }

    /* ── Barcode Scanner ── */
    .scan-section { padding: 12px 16px; border-bottom: 0.5px solid var(--sep); }
    .btn-scan {
      width: 100%; padding: 13px; background: rgba(30,114,200,0.08);
      border: none; border-radius: 12px;
      color: var(--accent); font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-scan:hover { opacity: 0.7; }
    .scanner-body { display: flex; flex-direction: column; }
    .barcode-reader-div { width: 100%; height: 280px; background: #000; position: relative; overflow: hidden; }
    /* html5-qrcode overrides — hide its built-in UI chrome */
    #barcode-reader { border: none !important; }
    #barcode-reader__scan_region { background: transparent !important; }
    #barcode-reader__scan_region img { display: none !important; }
    #barcode-reader__dashboard { display: none !important; }
    #barcode-reader video { width: 100% !important; object-fit: cover; }
    .scanner-status { padding: 12px 20px 4px; text-align: center; min-height: 38px; }
    .scan-hint    { font-size: 0.82rem; color: var(--text-2); }
    .scan-loading { font-size: 0.88rem; color: var(--text-2); font-weight: 500; }
    .scan-notfound, .scan-error { font-size: 0.88rem; color: var(--red); font-weight: 600; }
    .scan-camerror { font-size: 0.82rem; color: var(--red); }

    /* ── Global touch ────────────────────────────────── */
    button, [role="button"] {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── iOS auto-zoom prevention ────────────────────── */
    @media (max-width: 600px) {
      input, select, textarea,
      .food-search-input, .my-foods-search,
      .burned-input, .weight-entry-input { font-size: 16px !important; }
    }

    /* ── Small phones (≤ 480px) ──────────────────────── */
    @media (max-width: 480px) {
      .header { padding: 10px 14px 10px; }
      .header-top { margin-bottom: 10px; }
      .header-actions { gap: 5px; }
      .btn-data  { padding: 6px 9px; font-size: 0.76rem; }
      .btn-goals { padding: 6px 11px; font-size: 0.78rem; }
      .brand-name { font-size: 1rem; }
      .date-label { font-size: 0.8rem; }
      .header-nav { gap: 8px; }
      .nav-arrow { width: 28px; height: 28px; }

      .main { padding: 0 12px 96px; }

      .summary-card { padding: 16px 14px; gap: 14px; }
      .summary-cal-ring { width: 80px; height: 80px; }
      .summary-cal-inner { width: 64px; height: 64px; }

      .burned-card { padding: 12px 14px; }
      .burned-input { width: 72px; }

      .meals-grid { gap: 8px; }

      /* Week */
      .week-summary-card { padding: 16px 14px; }
      .week-summary-header { flex-direction: column; gap: 8px; }
      .week-cal-badge { text-align: left; }
      .week-macro-label { width: 50px; }
      .week-days-grid { gap: 4px; }
      .week-day-card { padding: 8px 2px; border-radius: 10px; }
      .week-bar-track { width: 20px; height: 46px; }
      .week-day-cals { font-size: 0.65rem; }
      .week-day-unit { font-size: 0.58rem; }
      .week-day-abbr { font-size: 0.65rem; }
      .week-day-date { display: none; }

      /* Weight */
      .weight-tracker { padding: 16px 14px; }
      .weight-stat { padding: 0 10px; }

      /* Modal — already bottom sheet, just reduce padding */
      .modal-form { grid-template-columns: 1fr; padding: 12px 14px 16px; gap: 10px; }
      .form-group.full { grid-column: 1; }
      .modal-footer { gap: 6px; padding-top: 12px; }
      .modal-footer .btn-secondary { padding: 10px 12px; font-size: 0.84rem; }
      .modal-footer .btn-primary   { padding: 10px 14px; font-size: 0.84rem; }

      .food-search-wrap    { padding: 10px 14px; }
      .food-search-results { padding: 4px 14px 10px; max-height: 150px; }
      .food-result-item    { padding: 8px 10px; }
      .scan-section        { padding: 10px 14px; }

      /* 44px min tap targets */
      .add-food-btn { padding: 13px 10px; }
      .meal-header  { min-height: 44px; }
      .food-item    { min-height: 44px; }
      .week-day-card { min-height: 44px; }
      .btn-scan     { padding: 14px; }
    }

    /* ── Very small (≤ 360px) ─────────────────────────── */
    @media (max-width: 360px) {
      .btn-data  { padding: 5px 7px; font-size: 0.72rem; }
      .btn-goals { padding: 5px 9px; }
      .modal-footer { flex-wrap: wrap; }
      .modal-footer .btn-secondary:first-child { flex: 0 0 100%; order: 3; }
      .modal-footer .btn-secondary:nth-child(2),
      .modal-footer .btn-primary { flex: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Storage ────────────────────────────────────────
    const STORAGE_KEY = 'cmt-data-v1';
    const loadData = () => { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } };
    const saveData = (d) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} };

    // ── Date Utils ─────────────────────────────────────
    const fmtDate = (d) => { const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; };
    const parseDate = (s) => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };
    const addDays = (s,n) => { const d=parseDate(s); d.setDate(d.getDate()+n); return fmtDate(d); };
    const isToday = (s) => s === fmtDate(new Date());
    const getWeekDates = (s) => {
      const d=parseDate(s), day=d.getDay(), diff=day===0?6:day-1;
      const mon=new Date(d); mon.setDate(d.getDate()-diff);
      return Array.from({length:7},(_,i)=>{ const x=new Date(mon); x.setDate(mon.getDate()+i); return fmtDate(x); });
    };
    const fmtLong = (s) => parseDate(s).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    const fmtShort = (s) => parseDate(s).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const dayAbbr = (s) => parseDate(s).toLocaleDateString('en-US',{weekday:'short'});
    const weekRange = (dates) => `${fmtShort(dates[0])} – ${fmtShort(dates[6])}`;

    // ── Constants ──────────────────────────────────────
    const DEFAULT_GOALS = { calories: 2000, protein: 150, carbs: 250, fat: 65 };
    const MEALS = [
      { key:'breakfast', label:'Breakfast', icon:'sunrise' },
      { key:'lunch',     label:'Lunch',     icon:'sun' },
      { key:'dinner',    label:'Dinner',    icon:'moon' },
      { key:'snack',     label:'Snack',     icon:'coffee' },
    ];

    const emptyDay = () => ({ breakfast:[], lunch:[], dinner:[], snack:[] });
    // ── SVG Icon component ─────────────────────────────
    function Icon({ name, size = 16, strokeWidth = 1.6, style = {}, className = '' }) {
      const p = {
        zap:      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
        sunrise:  <><path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="9" x2="12" y2="2"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/></>,
        sun:      <><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>,
        moon:     <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>,
        coffee:   <><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></>,
        target:   <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
        flame:    <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>,
        camera:   <><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>,
        download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        upload:   <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
        refresh:  <><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>,
        edit:     <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
        star:     <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
             stroke="currentColor" strokeWidth={strokeWidth}
             strokeLinecap="round" strokeLinejoin="round"
             style={{display:'inline-block',verticalAlign:'middle',flexShrink:0,...style}}
             className={className}>
          {p[name]}
        </svg>
      );
    }

    const sumMacros = (items) => items.reduce((a,f)=>({
      calories: a.calories + Number(f.calories||0),
      protein:  a.protein  + Number(f.protein||0),
      carbs:    a.carbs    + Number(f.carbs||0),
      fat:      a.fat      + Number(f.fat||0),
    }), {calories:0, protein:0, carbs:0, fat:0});

    // ── MacroBar ───────────────────────────────────────
    function MacroBar({ label, value, goal, color }) {
      const pct = goal>0 ? Math.min((value/goal)*100,100) : 0;
      const over = goal>0 && value>goal;
      return (
        <div className="macro-bar-wrap">
          <div className="macro-bar-header">
            <span className="macro-bar-label" style={{color}}>{label}</span>
            <span className="macro-bar-value">
              <strong style={{color: over ? 'var(--danger)' : 'var(--text)'}}>{Math.round(value)}</strong>
              <span className="macro-bar-goal"> / {goal}{label==='Calories'?' kcal':'g'}</span>
            </span>
          </div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${pct}%`, background: over?'var(--danger)':color}} />
          </div>
        </div>
      );
    }

    // ── Summary Card ───────────────────────────────────
    function SummaryCard({ totals, goals, burned }) {
      const bonus        = Math.round((burned || 0) * 0.5);
      const effectiveCal = goals.calories + bonus;
      const calPct    = effectiveCal > 0 ? Math.round((totals.calories / effectiveCal) * 100) : 0;
      const remaining = effectiveCal - totals.calories;
      const over      = remaining < 0;
      const ringDeg   = Math.min(calPct, 100) * 3.6;
      return (
        <div className="summary-card">
          <div className="summary-cal">
            <div className="summary-cal-ring" style={{background:`conic-gradient(${over?'var(--danger)':'var(--calories)'} ${ringDeg}deg, var(--surface3) 0deg)`}}>
              <div className="summary-cal-inner">
                <div className="summary-cal-num" style={{color: over?'var(--danger)':'var(--calories)'}}>{Math.round(totals.calories)}</div>
                <div className="summary-cal-sub">kcal</div>
              </div>
            </div>
            <div className="summary-cal-info">
              <div className="summary-cal-label">Calories</div>
              <div className="summary-remaining" style={{color: over?'var(--danger)':'inherit'}}>
                {over ? `${Math.abs(Math.round(remaining))} over goal` : `${Math.round(remaining)} remaining`}
              </div>
              <div className="summary-goal-text">
                Goal: {goals.calories}
                {bonus > 0 && <span className="summary-goal-bonus"> +{bonus} exercise = {effectiveCal}</span>}
                {' '}kcal
              </div>
            </div>
          </div>
          <div className="macro-bars">
            <MacroBar label="Protein" value={totals.protein} goal={goals.protein} color="var(--protein)" />
            <MacroBar label="Carbs"   value={totals.carbs}   goal={goals.carbs}   color="var(--carbs)" />
            <MacroBar label="Fat"     value={totals.fat}     goal={goals.fat}     color="var(--fat)" />
          </div>
        </div>
      );
    }

    // ── Burned Card ───────────────────────────────────
    function BurnedCard({ burned, onUpdate }) {
      const [val, setVal] = useState(burned > 0 ? String(burned) : '');
      const bonus = Math.round((burned || 0) * 0.5);

      // Keep local input in sync if parent value changes (e.g. date switch)
      useEffect(() => { setVal(burned > 0 ? String(burned) : ''); }, [burned]);

      const commit = () => {
        const n = parseFloat(val);
        onUpdate(isNaN(n) || n <= 0 ? 0 : Math.round(n));
      };

      return (
        <div className="burned-card">
          <span className="burned-icon"><Icon name="flame" size={22} strokeWidth={1.4}/></span>
          <div className="burned-info">
            <div className="burned-label">Exercise Calories Burned</div>
            {bonus > 0
              ? <div className="burned-boost">+{bonus} kcal added to today's goal (50% of burned)</div>
              : <div className="burned-sub">Adds 50% of burned calories to your daily goal</div>
            }
          </div>
          <div className="burned-input-wrap">
            <input
              className="burned-input"
              type="number" min="0" step="10" placeholder="0"
              value={val}
              onChange={e => setVal(e.target.value)}
              onBlur={commit}
              onKeyDown={e => e.key === 'Enter' && (e.target.blur(), commit())}
            />
            <span className="burned-unit">kcal</span>
          </div>
        </div>
      );
    }

    // ── Meal Section ───────────────────────────────────

    // ── Week View ──────────────────────────────────────
    function WeekMacroRow({ label, value, weekGoal, color }) {
      const pct = weekGoal>0 ? Math.min((value/weekGoal)*100,100) : 0;
      const over = weekGoal>0 && value>weekGoal;
      return (
        <div className="week-macro-row">
          <span className="week-macro-label" style={{color}}>{label}</span>
          <div className="week-macro-bar-track">

            <strong style={{color: over?'var(--danger)':'var(--text)'}}>{Math.round(value)}</strong>
            <span className="week-macro-goal"> / {Math.round(weekGoal)}{label==='Calories'?' kcal':'g'}</span>
          </span>
        </div>
      );

    function WeightChart({ history, weightUnit }) {
      const points = history.filter(w => w.value !== null);
      if (points.length < 2) {
        return <div className="chart-no-data">Log at least 2 weeks to see your trend</div>;
      }

      const W = 560, H = 150;
      const pL = 44, pR = 12, pT = 12, pB = 30;
      const plotW = W - pL - pR, plotH = H - pT - pB;

      const vals  = points.map(p => p.value);
      const minV  = Math.min(...vals), maxV = Math.max(...vals);
      const pad   = Math.max((maxV - minV) * 0.35, 2);
      const yMin  = minV - pad, yMax = maxV + pad, yRange = yMax - yMin;

      const n   = points.length;
      const xOf = i  => pL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW);
      const yOf = v  => pT + (1 - (v - yMin) / yRange) * plotH;

      // y-axis ticks
      const tickCount = 4;
      const yTicks = Array.from({ length: tickCount + 1 }, (_, i) => {
        const v = yMin + (yRange / tickCount) * i;
        return { v, y: yOf(v) };
      });

      // x-axis: show month label at first point of each new month
      const xLabels = [];
      let lastMonth = null;
      points.forEach((p, i) => {
        const mo = p.weekKey.slice(0, 7);
        if (mo !== lastMonth) {
          lastMonth = mo;
          const d = parseDate(p.weekKey);
          xLabels.push({ x: xOf(i), label: d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }) });
        }
      });

      const linePts  = points.map((p, i) => `${xOf(i)},${yOf(p.value)}`).join(' ');
      const areaPts  = `${xOf(0)},${pT + plotH} ${linePts} ${xOf(n - 1)},${pT + plotH}`;

      // Trend direction for colour
      const trend = points[n - 1].value - points[0].value;
      const lineColor = trend < -0.5 ? 'var(--carbs)' : trend > 0.5 ? 'var(--danger)' : 'var(--accent)';

      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="weight-chart-svg" aria-label="Weight history chart">
          <defs>
            <linearGradient id="wAreaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor={lineColor} stopOpacity="0.22" />
              <stop offset="100%" stopColor={lineColor} stopOpacity="0" />
            </linearGradient>
          </defs>

          {/* Grid lines + Y labels */}
          {yTicks.map((t, i) => (
            <g key={i}>
              <line x1={pL} y1={t.y} x2={W - pR} y2={t.y} stroke="var(--border)" strokeWidth="1" strokeDasharray="3,4" />
              <text x={pL - 6} y={t.y + 4} textAnchor="end" fontSize="10" fill="var(--text-3)">{Math.round(t.v)}</text>
            </g>
          ))}

          {/* X labels */}
          {xLabels.map((l, i) => (
            <text key={i} x={l.x} y={H - 4} textAnchor="middle" fontSize="10" fill="var(--text-3)">{l.label}</text>
          ))}

          {/* Area fill */}
          <polygon points={areaPts} fill="url(#wAreaGrad)" />

          {/* Line */}
          <polyline points={linePts} fill="none" stroke={lineColor} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />

          {/* Dots — highlight current week */}
          {points.map((p, i) => (
            <g key={i}>
              <title>{fmtShort(p.weekKey)}: {p.value} {weightUnit}</title>
              <circle cx={xOf(i)} cy={yOf(p.value)} r={p.isCurrent ? 5.5 : 3.5}
                fill={p.isCurrent ? lineColor : 'var(--bg)'}
                stroke={lineColor} strokeWidth="2.5" />
            </g>
          ))}
        </svg>
      );
    }

    function WeightTracker({ weekDates, weights, weightUnit, onUpdateWeight, onUpdateWeightUnit }) {
      const currentWeekKey = weekDates[0]; // Monday = canonical week key
      const [inputVal, setInputVal] = useState(
        weights[currentWeekKey] !== undefined ? String(weights[currentWeekKey]) : ''
      );

      // Sync input when navigating to a different week
      useEffect(() => {
        setInputVal(weights[currentWeekKey] !== undefined ? String(weights[currentWeekKey]) : '');
      }, [currentWeekKey]);

      // Build full week-by-week history from earliest entry to current week
      const buildHistory = () => {
        const keys = Object.keys(weights).sort();
        if (keys.length === 0) return [];
        const result = [];
        let key = keys[0];
        while (key <= currentWeekKey) {
          result.push({
            weekKey:   key,
            value:     weights[key] !== undefined ? weights[key] : null,
            isCurrent: key === currentWeekKey,
          });
          key = addDays(key, 7);
        }
        return result;
      };

      const history      = buildHistory();
      const filled       = history.filter(w => w.value !== null);
      const currentVal   = weights[currentWeekKey];
      const prevEntry    = [...filled].reverse().find(w => w.weekKey < currentWeekKey);
      const firstEntry   = filled[0];
      const lastEntry    = filled[filled.length - 1];
      const totalChange  = firstEntry && lastEntry && filled.length >= 2
        ? lastEntry.value - firstEntry.value : null;
      const recentChange = currentVal !== undefined && prevEntry
        ? currentVal - prevEntry.value : null;

      const handleSave = () => {
        const n = Number(inputVal);
        if (inputVal === '' || isNaN(n) || n <= 0) return;
        onUpdateWeight(currentWeekKey, inputVal);
      };

      return (
        <div className="weight-tracker">
          <div className="weight-tracker-header">
            <div>
              <div className="weight-tracker-title">⚖️ Weight Tracker</div>
              <div className="weight-tracker-sub">Once-a-week check-in</div>
            </div>
            <div className="weight-unit-toggle">
              <button type="button" className={`weight-unit-btn ${weightUnit==='lbs'?'active':''}`} onClick={() => onUpdateWeightUnit('lbs')}>lbs</button>
              <button type="button" className={`weight-unit-btn ${weightUnit==='kg'?'active':''}`}  onClick={() => onUpdateWeightUnit('kg')}>kg</button>
            </div>
          </div>

          {/* Weekly entry */}
          <div className="weight-entry-card">
            <div className="weight-entry-label">
              <span>This Week</span>
              <span className="weight-entry-date">{weekRange(weekDates)}</span>
            </div>
            <div className="weight-entry-row">
              <input
                className="weight-entry-input"
                type="number" min="0" step="0.1"
                placeholder={`Enter weight (${weightUnit})`}
                value={inputVal}
                onChange={e => setInputVal(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleSave()}
              />
              <button className="btn-primary weight-entry-save" onClick={handleSave}>
                {currentVal !== undefined ? 'Update' : 'Save'}
              </button>
            </div>
            {prevEntry && (
              <div className="weight-entry-hint">
                Last entry: {prevEntry.value} {weightUnit}
                {recentChange !== null && (
                  <span style={{
                    color: recentChange < 0 ? 'var(--carbs)' : recentChange > 0 ? 'var(--danger)' : 'var(--text-2)',
                    marginLeft: 8, fontWeight: 600
                  }}>
                    {recentChange > 0 ? '+' : ''}{recentChange.toFixed(1)} {weightUnit}
                  </span>
                )}
              </div>
            )}
          </div>

          {/* History chart */}
          <div className="weight-chart-wrap">
            <div className="weight-chart-label">History</div>
            <WeightChart history={history} weightUnit={weightUnit} />
          </div>

          {/* Stats */}
          {filled.length >= 2 && (
            <div className="weight-stats">
              <div className="weight-stat">
                <div className="weight-stat-label">Current</div>
                <div className="weight-stat-val">
                  {(currentVal ?? lastEntry.value).toFixed(1)}
                  <span style={{fontSize:'0.65rem',color:'var(--text-2)',marginLeft:3}}>{weightUnit}</span>
                </div>
              </div>
              <div className="weight-stat">
                <div className="weight-stat-label">Starting</div>
                <div className="weight-stat-val">{firstEntry.value.toFixed(1)}</div>
              </div>
              <div className="weight-stat">
                <div className="weight-stat-label">Total Change</div>
                <div className="weight-stat-val" style={{
                  color: totalChange < 0 ? 'var(--carbs)' : totalChange > 0 ? 'var(--danger)' : 'var(--text)'
                }}>
                  {totalChange > 0 ? '+' : ''}{totalChange.toFixed(1)} {weightUnit}
                </div>
              </div>
              <div className="weight-stat">
                <div className="weight-stat-label">Check-ins</div>
                <div className="weight-stat-val">{filled.length}</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function WeekView({ weekDates, getDayTotals, weekTotals, goals, currentDate, onSelectDate, weights, weightUnit, onUpdateWeight, onUpdateWeightUnit, getDayBurned, weekBurnedBonus }) {
      const wg          = { calories: goals.calories * 7 + (weekBurnedBonus || 0), protein:goals.protein*7, carbs:goals.carbs*7, fat:goals.fat*7 };
      const calRemaining = wg.calories - weekTotals.calories;
      const calOver      = calRemaining < 0;
      const calPct       = wg.calories > 0 ? Math.round((weekTotals.calories / wg.calories) * 100) : 0;

      return (
        <div className="week-view">
          <div className="week-summary-card">
            <div className="week-summary-header">
              <div>
                <div className="week-summary-title">Weekly Summary</div>
                <div className="week-summary-sub">
                  {weekBurnedBonus > 0
                    ? `Goal: ${goals.calories * 7} + ${weekBurnedBonus} exercise = ${wg.calories} kcal`
                    : '7-day total vs. goal'}
                </div>
              </div>
              <div className="week-cal-badge">
                <div style={{color: calOver?'var(--danger)':'var(--calories)'}}>
                  <span className="week-cal-num">{Math.round(weekTotals.calories)}</span>
                  <span className="week-cal-label"> kcal · {calPct}%</span>
                </div>
                <div className="week-cal-remaining" style={{color: calOver?'var(--danger)':'var(--text-2)'}}>
                  {calOver
                    ? `${Math.abs(Math.round(calRemaining))} kcal over`
                    : `${Math.round(calRemaining)} kcal remaining`}
                </div>
              </div>
            </div>
            <div className="week-macro-stack">
              <WeekMacroRow label="Calories" value={weekTotals.calories} weekGoal={wg.calories} color="var(--calories)" />
              <WeekMacroRow label="Protein"  value={weekTotals.protein}  weekGoal={wg.protein}  color="var(--protein)" />
              <WeekMacroRow label="Carbs"    value={weekTotals.carbs}    weekGoal={wg.carbs}    color="var(--carbs)" />
              <WeekMacroRow label="Fat"      value={weekTotals.fat}      weekGoal={wg.fat}      color="var(--fat)" />
            </div>
          </div>

          <div className="week-days-grid">
            {weekDates.map(d => {
              const t            = getDayTotals(d);
              const dayBonus     = Math.round((getDayBurned ? getDayBurned(d) : 0) * 0.5);
              const dayGoal      = goals.calories + dayBonus;
              const pct   = dayGoal > 0 ? Math.min((t.calories / dayGoal) * 100, 100) : 0;
              const over  = dayGoal > 0 && t.calories > dayGoal;
              const empty = t.calories === 0;
              return (
                <button key={d} className={`week-day-card ${d===currentDate?'selected':''} ${isToday(d)?'today':''}`} onClick={() => onSelectDate(d)}>
                  <div className="week-day-abbr">{dayAbbr(d)}</div>
                  <div className="week-day-date">{fmtShort(d)}</div>
                  <div className="week-bar-track">
                    <div className="week-bar-fill" style={{height:`${pct}%`, background: over?'var(--danger)':'var(--calories)', opacity: empty?0.15:1}} />
                  </div>
                  <div className={`week-day-cals ${over?'over':''} ${empty?'empty':''}`}>
                    {empty ? '—' : Math.round(t.calories)}
                  </div>
                  <div className="week-day-unit">kcal</div>
                </button>
              );
            })}
          </div>
          <div className="week-day-goal-line">
            Daily goal: {goals.calories} kcal{weekBurnedBonus > 0 && <span className="summary-goal-bonus"> +{weekBurnedBonus} exercise this week</span>} · Tap a day to view details
          </div>

          <WeightTracker
            weekDates={weekDates}
            weights={weights}
            weightUnit={weightUnit}
            onUpdateWeight={onUpdateWeight}
            onUpdateWeightUnit={onUpdateWeightUnit}
          />
        </div>
      );
    }
